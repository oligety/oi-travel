name: CI

on:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']

jobs:
  build-test-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Linting
        run: npm run lint

      - name: Run Unit Tests
        run: npm run test -- --run

      - name: Build Application
        run: npm run build
        env:
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/oitravel?schema=public'
          AUTH_SECRET: 'ci-dummy-secret-at-least-32-chars-long'
